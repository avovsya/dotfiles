# TMUX CHEAT SHEET: https://gist.github.com/henrik/1967800

## OPTS ----------------------------------------------- 
set -g base-index 1
set -g pane-base-index 1

set-window-option -g mode-keys vi

set-option -g visual-activity on
set-window-option -g monitor-activity off
set-window-option -g automatic-rename off
set-option -g allow-rename off

# Enable mouse
set -g mouse on

## KEY BINDINGS --------------------------------------- 

# Prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix # On <C-a><C-a> send <C-a> signal to terminal

bind v split-window -h
bind s split-window -v

# Navigate panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

bind-key -Tcopy-mode-vi 'v' send -X begin-selection
bind-key -Tcopy-mode-vi 'y' send -X copy-selection
bind-key -Tcopy-mode-vi 'r' send -X rectangle-toggle

## PLUGINS --------------------------------------------
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-yank'

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Theme
set -g @plugin 'jimeh/tmux-themepack'
set -g @themepack 'basic'

# Configure Automatic tmux start/restart/session restore
set -g @continuum-boot 'on'
set -g @continuum-boot-options 'iterm'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'   # auto-save every 5 min (default 15) — smaller window of lost worker windows

set -g @resurrect-save 'S'
set -g @resurrect-restore 'R'

# Restore running programs (not just pane layout/cwd) on resurrection / continuum boot-restore.
#  - capture-pane-contents: bring back each pane's scrollback so restored panes show prior output (display only).
#  - processes: APPENDED to the default whitelist (vim/less/man/...).
#    NOTE: a Claude pane's short name (#{pane_current_command}) is its VERSION string (e.g. 2.1.195),
#    NOT matched here. The default `ps` save strategy records the full args (e.g. `claude --dangerously-skip-permissions`),
#    and that is what `~match` (leading ~ = substring regex) tests against; `->cmd` overrides the restore command.
#
#    EVERY claude pane (workers AND the dispatcher) auto-resumes FULLY AUTONOMOUSLY: --continue restores the
#    pane's last session in its cwd, --dangerously-skip-permissions keeps it prompt-free. `~claude` always
#    matches, so this is robust and self-sustaining regardless of how a pane was last launched (e.g. a manual
#    `claude --resume` still matches `~claude`). Tradeoff: the dispatcher also skips permissions on resume —
#    acceptable since you're at the keyboard post-reboot and want the fleet back without friction.
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes '"~claude->claude --continue --dangerously-skip-permissions"'
# To keep the dispatcher prompt-gated instead (only flagged worker panes auto-resume), use:
#   set -g @resurrect-processes '"~dangerously-skip-permissions->claude --continue --dangerously-skip-permissions"'
# Codex workers: append once its resume flag is confirmed, e.g. add  "~codex->codex resume --last"  as a second element.

# Init TMUX plugin manager (keep this line at the very bottom of tmux.conf)
# NOTE: tpm is run WITHOUT -b (synchronous) on purpose. themepack's status-right would otherwise
# load async AFTER the continuum re-init below and clobber continuum's `#(continuum_save.sh)` save
# hook, silently disabling auto-save. Synchronous tpm guarantees themepack is loaded before the
# trailing continuum re-init re-appends the save hook to status-right.
run '~/.tmux/plugins/tpm/tpm'
run-shell '~/.tmux/plugins/tmux-continuum/continuum.tmux'
